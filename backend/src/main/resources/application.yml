spring:
  application:
    name: altscore-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/altscore_db}
    username: ${SPRING_DATASOURCE_USERNAME:altscore_user}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

ml:
  service:
    url: ${ML_SERVICE_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:super-secret-jwt-key-change-this-in-production}
  expiration: 86400000

logging:
  level:
    com.zaxxer.hikari: DEBUG
    org.springframework.security: INFO