spring:
  application:
    name: altscore-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/altscore_db
    username: altscore_user
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

# Custom configurations
ml:
  service:
    url: http://localhost:8000

jwt:
  secret: ${JWT_SECRET:super-secret-jwt-key-change-this-in-production}
  expiration: 86400000   # 24 hours